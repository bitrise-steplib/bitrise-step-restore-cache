format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
workflows:
  test_npm:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-React-Native-Sample
    - BRANCH: master
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - script:
        title: Install dependencies
        inputs:
        - content: |-
            set -ex
            npm install
    - git::https://github.com/bitrise-steplib/bitrise-step-save-cache.git@main:
        title: Save cache
        run_if: "true"
        inputs:
        # E2E tests run in parallel on different stacks, key should be unique to avoid race conditions
        - key: "{{ getenv \"BITRISEIO_STACK_ID\" }}-restore-cache-step-node-modules-{{ checksum \"package-lock.json\" }}"
        - paths: |-
            node_modules
        - verbose: "true"
    - script:
        title: Delete node_modules
        inputs:
        - content: |-
            set -ex
            rm -rf node_modules
    - path::./:
        title: Restore cache
        run_if: "true"
        is_skippable: false
        inputs:
        - key: |-
            {{ getenv "BITRISEIO_STACK_ID" }}-restore-cache-step-node-modules-{{ checksum "package-lock.json" }}
            {{ getenv "BITRISEIO_STACK_ID" }}-restore-cache-step-node-modules-
        - verbose: "true"
    - script:
        title: Verify restored folder
        inputs:
        - content: |-
            set -ex
            if [ ! -d node_modules ]; then
              echo "node_modules directory doesn't exist"
              exit 1
            fi
    - script:
        title: Install dependencies again
        inputs:
        - content: |-
            set -ex
            npm install

  test_gradle:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-Android-Sample
    - BRANCH: main
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - android-build:
        title: Build APK
        inputs:
        - module: app
        - variant: debug
    - git::https://github.com/bitrise-steplib/bitrise-step-save-cache.git@main:
        title: Save cache
        run_if: "true"
        inputs:
        # E2E tests run in parallel on different stacks, key should be unique to avoid race conditions
        - key: "{{ getenv \"BITRISEIO_STACK_ID\" }}-gradle-cache-{{ checksum \"**/*.gradle\" \"**/gradle-wrapper.properties\" }}"
        - paths: |-
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/configuration-cache
        - verbose: "true"
    - script:
        title: Delete local Gradle caches
        inputs:
        - content: |-
            set -ex
            sudo rm -rf .gradle
            sudo rm -rf ~/.gradle
    - path::./:
        title: Restore cache
        run_if: "true"
        is_skippable: false
        inputs:
        - key: "{{ getenv \"BITRISEIO_STACK_ID\" }}-gradle-cache-{{ checksum \"**/*.gradle\" \"**/gradle-wrapper.properties\" }}"
        - verbose: "true"
    - script:
        title: Verify restored folder
        inputs:
        - content: |-
            set -ex
            if [ ! -d ~/.gradle/caches ]; then
              echo "~/.gradle/caches directory doesn't exist"
              exit 1
            fi
            if [ ! -d ~/.gradle/wrapper ]; then
              echo "~/.gradle/wrapper directory doesn't exist"
              exit 1
            fi
    - script:
        title: Verify exact cache hit
        inputs:
        - content: |-
            set -ex
            echo "BITRISE_CACHE_HIT: ${BITRISE_CACHE_HIT}"
            if [ "$BITRISE_CACHE_HIT" != "exact" ]; then
              echo "Cache was not restored properly"
              exit 1
            fi
    - android-build:
        title: Build APK again
        inputs:
        - module: app
        - variant: debug

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
